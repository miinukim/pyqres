defaults:
  - experiment: default
  - baseline: default
  - logging: local
  - _self_

hydra:
  job:
    name: ${experiment.name}
  run:
    dir: outputs/${experiment.name}/${now:%Y-%m-%d}/${now:%H-%M-%S}_channel_equalization_symbol_seed=${experiment.seed}
  sweep:
    dir: multirun/${experiment.name}/${now:%Y-%m-%d_%H-%M-%S}
    subdir: seed=${experiment.seed},job=${hydra.job.num}

experiment:
  name: pyqres_channel_equalization_symbol

reservoir_params:
  n_system: 2
  n_ancilla: 4
  tau: 1.0
  seed: 17462
  hx0_base: 1.0
  hz1_base: 1.0
  hx0_std: 1.0
  hz1_std: 1.0
  hx0_scale: 2.0
  hz1_scale: 0.5
  J_scale: 1.0
  graph_kind: full

reservoir:
  kind: channel_map
  n_system: 2
  n_ancilla: 4
  tau: 1.0
  input_scale: 1.0
  include_bias: false
  use_shot_noise: false
  shots: 4096
  init_state: zero
  seed: 17462
  control:
    measurement_mode: projective
    measurement_strength: 1.0
    post_measurement_mode: reset
    conditioned_gate: none
    conditioned_gate_angle: 3.141592653589793
    conditioned_gate_target: 0
    conditioned_gate_condition: nonzero

dataset:
  n_train: 20
  n_test: 20
  n_symb: 100
  input_seed: 17462
  symbols: [-3.0, -1.0, 1.0, 3.0]
  taps: [1.0, 0.18, -0.10, 0.091, -0.05, 0.04, 0.03, 0.01]
  nonlin2: 0.06
  nonlin3: -0.01

readout:
  fit_intercept: true
  l2: 1.0e-6
  max_iter: 1000
  tol: 1.0e-9

benchmark:
  snr_list: [0.0, 5.0, 10.0, 15.0, 20.0, 25.0]
